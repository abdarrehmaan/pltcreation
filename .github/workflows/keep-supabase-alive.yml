name: Keep Supabase Alive

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database & Website Keepalive Endpoint
        run: |
          curl -s -X GET "${{ secrets.SITE_URL || 'https://hifza.in' }}/api/cron/keepalive" || true
          curl -s -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/" || true
